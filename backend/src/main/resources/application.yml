spring:
  application:
    name: serviceops
  profiles:
    default: local
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

server:
  port: ${BACKEND_PORT:8080}
  error:
    include-message: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    persist-authorization: true

serviceops:
  jwt:
    issuer: serviceops-local
    access-token-minutes: 480
    secret: ${JWT_SECRET:U2VydmljZU9wcy1Mb2NhbC1EZXZlbG9wbWVudC1TZWNyZXQtS2V5LTIwMjYtMTIzNDU2Nzg5MA==}
  storage:
    root: ${FILE_STORAGE_ROOT:./data/uploads}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
