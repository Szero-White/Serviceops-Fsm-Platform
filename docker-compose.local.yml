services:
  postgres:
    image: postgres:17-alpine
    container_name: serviceops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-serviceops}
      POSTGRES_USER: ${POSTGRES_USER:-serviceops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-serviceops}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - serviceops_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-serviceops} -d ${POSTGRES_DB:-serviceops}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  serviceops_postgres_data:
